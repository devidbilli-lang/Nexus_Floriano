function giorniLavorativiJS(tsInizio) {
  if(!tsInizio) return 1;
  var cur = new Date(tsInizio); cur.setHours(0,0,0,0);
  var oggi = new Date(); oggi.setHours(0,0,0,0);
  var gg = 0;
  while(cur.getTime() <= oggi.getTime()) {
    var dow = cur.getDay();
    if(dow !== 0 && dow !== 6) gg++;
    cur.setDate(cur.getDate()+1);
  }
  return Math.min(15, Math.max(1, gg));
}

const parseData = s => { if(!s) return null;
  if(typeof s === "number") return new Date(s);
  const str = s.toString().trim();
  const m = str.match(/^(\d{2})\/(\d{2})\/(\d{4})[ ,]+(\d{2}):(\d{2})(?::(\d{2}))?/);
  if(m) return new Date(m[3],m[2]-1,m[1],m[4],m[5],m[6]||0);
  const d = new Date(str);
  return isNaN(d)?null:d;
};

async function fetchConRetry(url, tentativi=5, delayMs=1000) {
  for (let i = 0; i < tentativi; i++) {
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 25000);
      const r = await fetch(url, {signal: ctrl.signal}).finally(() => clearTimeout(tid));
      if (r.ok) return r;
    } catch(e) {
      if (i < tentativi - 1) {
        await new Promise(res => setTimeout(res, delayMs * (i + 1)));
      }
    }
  }
  throw new Error('Richiesta fallita dopo ' + tentativi + ' tentativi');
}

function codaAggiungi(url) {
  try {
    const coda = JSON.parse(localStorage.getItem(CODA_KEY)||"[]");
    if(!coda.find(e=>e.url===url)) { coda.push({url,ts:Date.now(),tentativi:0}); localStorage.setItem(CODA_KEY,JSON.stringify(coda)); }
  } catch(e) {}
}
function codaRimuovi(url) {
  try {
    const coda = JSON.parse(localStorage.getItem(CODA_KEY)||"[]");
    localStorage.setItem(CODA_KEY,JSON.stringify(coda.filter(e=>e.url!==url)));
  } catch(e) {}
}
async function codaProcessa() {
  try {
    const coda = JSON.parse(localStorage.getItem(CODA_KEY)||"[]");
    if(!coda.length) return;
    console.log("[CODA] Riprovo "+coda.length+" eventi...");
    const nuova = [];
    for(const ev of coda){
      try {
        const ctrl=new AbortController(); const tid=setTimeout(()=>ctrl.abort(),15000);
        const r=await fetch(ev.url,{signal:ctrl.signal}).finally(()=>clearTimeout(tid));
        if(r.ok){ console.log("[CODA] OK:", ev.url.substring(0,60)); }
        else { ev.tentativi++; if(ev.tentativi<20) nuova.push(ev); }
      } catch(e){ ev.tentativi++; if(ev.tentativi<20) nuova.push(ev); }
    }

}

function tappe(s) { const fine = s.fine ? new Date(s.fine) : now();

  let lc     = s.lineaCorrente;

  if(!tr.length){ out.push({linea:lc,sku:sc,ms:fine-cur}); } else { const p0 = new Date(tr[0].quando);

}

function GaugeEfficienza({ valore, label, size=160 }) {
  const v = valore !== null ? Math.min(100, Math.max(0, valore)) : null;
  const colore = v === null ? "#cbd5e1" : v >= 80 ? "#22c55e" : v >= 60 ? "#f59e0b" : "#ef4444";
  const r = (size/2) - 18;
  const circ = 2 * Math.PI * r;
  const dash = v !== null ? (v/100)*circ : 0;
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
      <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e2e8f0" strokeWidth={14}/>
        {v !== null && <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={colore} strokeWidth={14}
          strokeDasharray={dash+" "+(circ-dash)} strokeDashoffset={circ/4}
          strokeLinecap="round" style={{transition:"stroke-dasharray 0.8s ease"}}/>}
        <text x={size/2} y={size/2+6} textAnchor="middle" fontSize={v!==null?28:18} fontWeight={800} fill={colore} fontFamily="Montserrat,sans-serif">
          {v !== null ? v+"%" : "—"}
        </text>
      </svg>
      <div style={{fontSize:13,fontWeight:700,color:"#475569",fontFamily:"'Montserrat',sans-serif"}}>{label}</div>
    </div>
  );
}

const SKU_SPECIALI = [
  {sku:"RIPARAZIONE",descrizione:"🔧 Riparazione",collezione:"",tc:0,speciale:true}
];
function isSkuSpeciale(sku) { return SKU_SPECIALI.some(s=>s.sku===(sku||"").toUpperCase()); }
function skuConSpeciali(list) { return [...SKU_SPECIALI,...(list||[])]; }

function ObiettivoProduzione({ sessioni, lineaId, skuList, borseOggi, borseKO, borseMigl, maxOpOggi, coloreLinea }) {
  const [tick, setTick] = React.useState(0);
  const _now = new Date(); // si ricalcola ad ogni tick
  const _hh = _now.getHours(); const _mm = _now.getMinutes(); const _ss = _now.getSeconds();
  const _secOra = _hh*3600+_mm*60+_ss;
  const storKey = "straord_"+lineaId;
  const [oreExtra, setOreExtraRaw] = React.useState(()=>{ try{ const v=localStorage.getItem(storKey); return v?parseFloat(v):0; }catch{return 0;} });
  const pausaKey = "pausa_fl_"+lineaId;
  const [inPausa, setInPausaRaw] = React.useState(()=>{ try{ return localStorage.getItem(pausaKey)==="1"; }catch{return false;} });
  const [pausaInizio, setPausaInizioRaw] = React.useState(()=>{ try{ const v=localStorage.getItem(pausaKey+"_ts"); return v?Number(v):null; }catch{return null;} });
  const setInPausa = (v, ts=null) => {
    setInPausaRaw(v);
    try{ localStorage.setItem(pausaKey, v?"1":"0"); }catch{}
    if(v && ts){ setPausaInizioRaw(ts); try{ localStorage.setItem(pausaKey+"_ts", String(ts)); }catch{} }
    else if(!v){ setPausaInizioRaw(null); try{ localStorage.removeItem(pausaKey+"_ts"); }catch{} }
  };
  // Carica straordinario da Sheets al montaggio
  React.useEffect(()=>{
    fetchConRetry(APPS_SCRIPT_URL+"?action=leggistraordinario&lineaId="+encodeURIComponent(lineaId), 3, 1000)
      .then(r=>r.json()).then(j=>{ if(j.ok&&j.data.oreExtra!=null){ setOreExtraRaw(j.data.oreExtra); try{localStorage.setItem(storKey,j.data.oreExtra);}catch{} } }).catch(()=>{});
  },[lineaId]);
  const setOreExtra = v => {
    setOreExtraRaw(v);
    try{ localStorage.setItem(storKey, v); }catch{}
    // Salva su Sheets colonna N del primo check-in della linea
    fetchConRetry(APPS_SCRIPT_URL+"?action=salvastraordinario&lineaId="+encodeURIComponent(lineaId)+"&oreExtra="+encodeURIComponent(v), 3, 1000).catch(()=>{});
  };
  const oreTotali = 9 + (oreExtra||0);
  React.useEffect(()=>{ const t=setInterval(()=>setTick(x=>x+1),1000); return()=>clearInterval(t); },[]);

    // Checkout automatico quando il turno finisce
  const [turnoChiuso, setTurnoChiuso] = React.useState(false);
  React.useEffect(()=>{
    if(turnoChiuso) return;
    if(!_primoCheckinTs) return;
    const secOraAttuale = new Date().getHours()*3600+new Date().getMinutes()*60+new Date().getSeconds();
    if(secOraAttuale < secFineTurnoAssoluto) return;
    // Turno scaduto → chiudi tutti gli operatori attivi
    const sessAttiveLinea = sessioni.filter(s=>
      s.lineaCorrente===lineaId&&(!s.fine||s.fine===""||s.fine===null||s.fine==="null")
    );
    if(sessAttiveLinea.length===0) return;
    setTurnoChiuso(true);
    (async()=>{
      const checkoutOp = async(s)=>{
        const url = APPS_SCRIPT_URL+"?action=evento&sessionId="+encodeURIComponent(s.id||s.sessionId||"")+"&matricola="+encodeURIComponent(s.matricola||"")+"&nome="+encodeURIComponent(s.nome||"")+"&cognome="+encodeURIComponent(s.cognome||"")+"&sku="+encodeURIComponent(s.skuCorrente||s.sku||"")+"&tipo=CHECKOUT&lineaDa="+encodeURIComponent(s.lineaCorrente||"")+"&lineaA=&skuDa="+encodeURIComponent(s.skuCorrente||s.sku||"")+"&skuA=";
        for(let i=0;i<3;i++){
          try{ await fetchConRetry(url,5,1000); return {ok:true}; }catch(e){ if(i<2) await new Promise(r=>setTimeout(r,2000*(i+1))); }
        }
        return {ok:false,s};
      };
      const results = await Promise.all(sessAttiveLinea.map(s=>checkoutOp(s)));
      const falliti = results.filter(r=>!r.ok);
      if(falliti.length>0){
        // Riprova i falliti
        for(const {s} of falliti){ await checkoutOp(s); }
      }
    })();
  },[tick, turnoChiuso, secFineTurnoAssoluto, _primoCheckinTs]);
  // Calcola primo check-in reale della linea
  const _primoCheckinTs = (()=>{
    const ts = sessioni
      .filter(s=>(s.lineaCorrente===lineaId||s.lineaInizio===lineaId)&&s.inizio)
      .map(s=>{
        // Se trasferito su questa linea, usa l'orario del trasferimento non il check-in originale
        if(s.lineaInizio!==lineaId&&s.trasferimenti&&s.trasferimenti.length>0){
          const trVers=s.trasferimenti.filter(t=>(t.a||"").trim().toLowerCase()===(lineaId||"").trim().toLowerCase());
          if(trVers.length>0){ const dTr=parseData(trVers[trVers.length-1].quando); if(dTr) return dTr.getTime(); }
        }
        const d=parseData(s.inizio); return d?d.getTime():null;
      })
      .filter(Boolean);
    return ts.length>0 ? Math.min(...ts) : null;
  })();
  const _primoCheckinDate = _primoCheckinTs ? new Date(_primoCheckinTs) : null;
  const _secInizioTurno = _primoCheckinDate
    ? _primoCheckinDate.getHours()*3600+_primoCheckinDate.getMinutes()*60+_primoCheckinDate.getSeconds()
    : 6*3600;
  const labelInizio = _primoCheckinDate
    ? String(_primoCheckinDate.getHours()).padStart(2,"0")+":"+String(_primoCheckinDate.getMinutes()).padStart(2,"0")
    : "06:00";
  const _oreFineDecimale = _secInizioTurno/3600 + oreTotali;
  const _hFine = Math.floor(_oreFineDecimale)%24;
  const _mFine = Math.round((_oreFineDecimale%1)*60);
  const labelFine = String(_hFine).padStart(2,"0")+":"+String(_mFine).padStart(2,"0");
  const secFineTurnoAssoluto = _secInizioTurno + oreTotali*3600;
  const sessAttive = sessioni.filter(s=>s.lineaCorrente===lineaId&&(!s.fine||s.fine===""||s.fine===null||s.fine==="null"));
  // Deduplica per matricola: una matricola = un operatore (prendi sessione più recente)
  const sessAttivePerMat = {};
  sessAttive.forEach(s=>{
    const mat = s.matricola||s.nome||s.id;
    if(!mat) return;
    const d = parseData(s.inizio);
    if(!sessAttivePerMat[mat]||d>sessAttivePerMat[mat].d)
      sessAttivePerMat[mat]={d,s};
  });
  const sessAttiveUniche = Object.values(sessAttivePerMat).map(x=>x.s);
  const nOp = sessAttiveUniche.length;
  const skuCount={};
  sessAttiveUniche.forEach(s=>{const sk=s.skuCorrente||s.sku||"";if(sk&&!isSkuSpeciale(sk))skuCount[sk]=(skuCount[sk]||0)+1;});
  const skuPiu=Object.entries(skuCount).sort((a,b)=>b[1]-a[1])[0]?.[0]||"";
  // Conta operatori in riparazione separatamente
  const nRiparazione=sessAttiveUniche.filter(s=>isSkuSpeciale(s.skuCorrente||s.sku||"")).length;
  const nCorso=sessAttiveUniche.filter(s=>s.corsi&&s.corsi.some(c=>c.tipo==="sospendi")).length;
  const nOpProduzione=nOp-nRiparazione-nCorso;
  const skuObj=skuList.find(s=>s.sku===skuPiu);
  const tc=skuObj?.tc||0;
  // Fine turno = primo check-in della linea + (8h + straordinario)
  const secFineTurno = secFineTurnoAssoluto;

  // Obiettivo finale = Σ per ogni operatore: floor(ore_disponibili × 60/tc)
  // ore_disponibili = fine turno - check-in operatore
  // OBIETTIVO: turno 8h + straordinario per ogni operatore
  // Si scala solo per: corso, riparazione, trasferimento ad altra linea
  // NON scende per uscite anticipate o entrate tardive
  const obFinale = tc>0 ? (()=>{
    const sessioniLinea = sessioni.filter(s=>
      (s.lineaCorrente===lineaId||s.lineaInizio===lineaId)&&s.inizio
    );
    // Per ogni matricola: calcola minuti disponibili meno periodi improduttivi
    const minPerMat = {};

    sessioniLinea.forEach(s=>{
      const mat = s.matricola||s.nome||s.id;
      if(!mat) return;
      const dInizio = parseData(s.inizio);
      if(!dInizio) return;
      const sku = s.skuCorrente||s.sku||"";
      const attiva = !s.fine||s.fine===""||s.fine===null||s.fine==="null";

      // Base: ore dal check-in (o dal trasferimento se arrivato da altra linea) a fine turno
      // - se ancora in turno → fino a fine turno teorico
      // - se uscito → fino al checkout reale (cala il dinamico)
      let secIng = dInizio.getHours()*3600+dInizio.getMinutes()*60;
      // Se l'operatore è arrivato per trasferimento, usa l'orario del trasferimento
      if(s.lineaInizio!==lineaId && s.trasferimenti&&s.trasferimenti.length>0){
        // Cerca il trasferimento verso questa linea
        const trVers = s.trasferimenti.filter(t=>(t.a||"").trim().toLowerCase()===(lineaId||"").trim().toLowerCase());
        if(trVers.length>0){
          const dTr = parseData(trVers[trVers.length-1].quando);
          if(dTr) secIng = dTr.getHours()*3600+dTr.getMinutes()*60;
        }
      }
      const dFine = attiva ? null : parseData(s.fine);
      const secFineEff = (attiva||!dFine)
        ? secFineTurno
        : Math.min(dFine.getHours()*3600+dFine.getMinutes()*60, secFineTurno);
      const minBase = Math.max(0,(secFineEff-secIng)/60);

      if(!minPerMat[mat]) minPerMat[mat]={base:minBase, sottrai:0, contato:false};
      else {
        // Se rientra (nuova sessione attiva) aggiorna con la base corretta
        if(attiva) minPerMat[mat].base = Math.max(minPerMat[mat].base, minBase);
        else if(!minPerMat[mat].contato) minPerMat[mat].base = minBase;
      }
      minPerMat[mat].contato = true;

      // Scala per riparazione (sessione attiva con SKU riparazione)
      if(isSkuSpeciale(sku)){
        const secFineRip = attiva ? secFineTurno : (()=>{
          const dF = parseData(s.fine);
          return dF ? Math.min(dF.getHours()*3600+dF.getMinutes()*60, secFineTurno) : secFineTurno;
        })();
        minPerMat[mat].sottrai += Math.max(0,(secFineRip-secIng)/60);
        return;
      }

      // Scala per trasferimento verso altra linea
      // - sessione chiusa con lineaCorrente diversa → era qui, poi trasferito via
      // - sessione attiva con lineaCorrente diversa → è già su altra linea, escludi completamente
      if(s.lineaCorrente!==lineaId){
        if(!attiva){
          // Era qui, poi trasferito: conta solo fino al momento del trasferimento
          const dF = parseData(s.fine);
          const secFineLinea = dF ? Math.min(dF.getHours()*3600+dF.getMinutes()*60, secFineTurno) : secFineTurno;
          minPerMat[mat].sottrai += Math.max(0,(secFineTurno-secFineLinea)/60);
        } else {
          // È attivo ma su altra linea (trasferito via) → non contribuisce più
          if(minPerMat[mat]) delete minPerMat[mat];
        }
        return;
      }

      // Scala per corsi
      if(s.corsi&&s.corsi.length>0){
        s.corsi.forEach(c=>{
          const dCorsoIn = parseData(c.quando);
          if(!dCorsoIn) return;
          const secCorsoIn = dCorsoIn.getHours()*3600+dCorsoIn.getMinutes()*60;
          let secCorsoOut;
          if(c.rientro){ const dR=parseData(c.rientro); secCorsoOut=dR?dR.getHours()*3600+dR.getMinutes()*60:secFineTurno; }
          else { secCorsoOut = secFineTurno; }
          minPerMat[mat].sottrai += Math.max(0,(secCorsoOut-secCorsoIn)/60);
        });
      }
    });

    let minTotali=0;
    Object.values(minPerMat).forEach(({base,sottrai})=>{
      minTotali += Math.max(0, base-sottrai);
    });
    const tot = minTotali>0 ? Math.ceil(minTotali/tc) : 0;
    return tot>0?tot:null;
  })() : null;
  const ob60 = obFinale!=null&&oreTotali>0 ? Math.round(obFinale/oreTotali) : null;
  // Efficienza = (borse prodotte * TC) / minuti lavorati * 100
  const efficienzaPct = (()=>{
    const borseTot = borseOggi||0;
    if(borseTot===0||tc<=0) return null;
    // Minuti lavorati = somma minuti effettivi di tutti gli operatori finora
    const sessLinea = sessioni.filter(s=>(s.lineaCorrente===lineaId||s.lineaInizio===lineaId)&&s.inizio);
    const now3 = new Date();
    const secNow = now3.getHours()*3600+now3.getMinutes()*60+now3.getSeconds();
    let minLavorati = 0;
    const matVisti = new Set();
    sessLinea.forEach(s=>{
      const mat = s.matricola||s.nome||s.id; if(!mat||matVisti.has(mat)) return;
      if(isSkuSpeciale(s.skuCorrente||s.sku||"")) return;
      matVisti.add(mat);
      const dI = parseData(s.inizio); if(!dI) return;
      const secI = dI.getHours()*3600+dI.getMinutes()*60;
      const attiva = !s.fine||s.fine===""||s.fine===null||s.fine==="null";
      const secF = attiva ? Math.min(secNow, secFineTurno) : (()=>{ const dF=parseData(s.fine); return dF?Math.min(dF.getHours()*3600+dF.getMinutes()*60,secFineTurno):secFineTurno; })();
      minLavorati += Math.max(0,(secF-secI)/60);
    });
    if(minLavorati<=0) return null;
    return Math.round((borseTot*tc)/minLavorati*100);
  })();
  const ob60Reale = tc>0&&nOpProduzione>0 ? Math.floor(nOpProduzione*(60/tc)) : null;

  // OBIETTIVO FISSO: max persone uniche registrate oggi × ore turno / TC
  const obiettivoFisso = tc>0 ? (()=>{
    const sessioniLinea = sessioni.filter(s=>
      (s.lineaCorrente===lineaId||s.lineaInizio===lineaId)&&s.inizio
    );
    // Matricole uniche che hanno lavorato su produzione (escluse riparazioni)
    const matricoleUniche = new Set();
    sessioniLinea.forEach(s=>{
      const mat = s.matricola||s.nome||s.id;
      if(!mat) return;
      const sku = s.skuCorrente||s.sku||"";
      if(isSkuSpeciale(sku)) return;
      matricoleUniche.add(mat);
    });
    const nOpMax = matricoleUniche.size;
    if(nOpMax===0) return null;
    const minTotali = nOpMax * oreTotali * 60;
    return Math.ceil(minTotali / tc);
  })() : null;
  const borse=borseOggi||0;
  const ko=borseKO||0;
  const migl=borseMigl||0;
  const pctQualita = borse>0 ? Math.round((borse-ko-migl)/borse*100) : null;
  const colQualita = pctQualita===null?"#94a3b8":pctQualita>=95?"#22c55e":pctQualita>=85?"#f59e0b":"#ef4444";
  const colBorse=ob60&&borse>=ob60?"#22c55e":ob60&&borse>=ob60*0.8?"#f59e0b":"#ef4444";

  if(nOp===0) return (
    <div style={{textAlign:"center",padding:"32px 16px",color:"#94a3b8"}}>
      <div style={{fontSize:40,marginBottom:8}}>⏸</div>
      <div style={{fontSize:14,fontWeight:600}}>Nessun operatore attivo</div>
    </div>
  );

  return (
    <div style={{padding:"16px 12px",display:"flex",flexDirection:"column",flex:1}}>
      {/* Campo straordinario */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,background:"rgba(255,255,255,0.08)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",border:"1px solid rgba(167,139,250,0.8)",borderRadius:10,padding:"10px 14px",boxShadow:"0 8px 32px rgba(124,58,237,0.3), inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(124,58,237,0.2)"}}>
        <span style={{fontSize:13,fontWeight:700,color:"#a78bfa"}}>⏱ Straordinario</span>
        <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:"auto"}}>
          <button onClick={()=>setOreExtra(Math.max(0,oreExtra-1))} style={{width:28,height:28,borderRadius:6,border:"1px solid rgba(167,139,250,0.8)",background:"rgba(124,58,237,0.3)",cursor:"pointer",fontWeight:900,fontSize:16,color:"#a78bfa"}}>−</button>
          <span style={{fontSize:18,fontWeight:900,color:"#7c3aed",minWidth:40,textAlign:"center"}}>{oreExtra===0?"0h":"+"+oreExtra+"h"}</span>
          <button onClick={()=>setOreExtra(oreExtra+1)} style={{width:28,height:28,borderRadius:6,border:"1px solid rgba(167,139,250,0.8)",background:"rgba(124,58,237,0.3)",cursor:"pointer",fontWeight:900,fontSize:16,color:"#a78bfa"}}>+</button>
        </div>
        {oreExtra>0&&<span style={{fontSize:11,color:"#a78bfa",fontWeight:600}}>Fine turno: {labelFine}</span>}
      </div>

      {/* Pulsante Pausa Pranzo */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,background:inPausa?"rgba(239,68,68,0.1)":"rgba(34,197,94,0.1)",border:"1px solid "+(inPausa?"#fca5a5":"#86efac"),borderRadius:10,padding:"10px 14px"}}>
        <span style={{fontSize:13,fontWeight:700,color:inPausa?"#dc2626":"#16a34a"}}>
          {inPausa?"⏸ Pausa pranzo in corso...":"🍽 Pausa Pranzo"}

                {/* Timer countdown al centro */}
                {(()=>{
                  const secOra2 = _now.getHours()*3600+_now.getMinutes()*60+_now.getSeconds();
                  const secRim = Math.max(0, secFineTurnoAssoluto - secOra2);
                  const textColor = percTempo>50?"#ffffff":"#1e293b";

                    <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:10}}>

                        {String(hR).padStart(2,"0")}:{String(mR).padStart(2,"0")}:{String(sR).padStart(2,"0")}

                  const secLabel = _secInizioTurno + h*3600;

function aggiungiGiorniLavorativi(dataInizio, giorni) {
  var d = new Date(dataInizio);
  var aggiunti = 0;
  while (aggiunti < giorni) {
    d.setDate(d.getDate() + 1);
    var gg = d.getDay();
    if (gg !== 0 && gg !== 6) aggiunti++; // salta sab e dom
  }
  return d;
}

function DashboardQualita({ linea, linee, skuList, difettiList=[], onEsci }) {
  const [obRealeQ, setObRealeQ]   = React.useState(null);
  const [obTeoricoQ, setObTeoricoQ] = React.useState(null);

  // Carica automaticamente gli obiettivi dalla sezione produzione
  React.useEffect(()=>{
    const caricaObiettivi = async () => {
      try {
        // Prendi sessioni e calcola obiettivi
        const r = await fetch(APPS_SCRIPT_URL+"?action=sessioni");
        const j = await r.json();
        if(!j.ok||!j.data) return;
        const sessioni = j.data.sessioni||[];
        const lineaId = linea?.id||"";
        const skuConSpecialiList = [...SKU_SPECIALI,...(skuList||[])];

        // Calcola primo check-in e fine turno
        const ts = sessioni
          .filter(s=>(s.lineaCorrente===lineaId||s.lineaInizio===lineaId)&&s.inizio)
          .map(s=>{ const d=parseData(s.inizio); return d?d.getHours()*3600+d.getMinutes()*60:null; })
          .filter(Boolean);
        if(ts.length===0) return;
        const secInizio = Math.min(...ts);
        const oreTotali = 8; // turno standard
        const secFine = secInizio + oreTotali*3600;

        // SKU più frequente
        const skuCount={};
        sessioni.filter(s=>s.lineaCorrente===lineaId&&(!s.fine||s.fine===""||s.fine===null)).forEach(s=>{
          const sk=s.skuCorrente||s.sku||"";
          if(sk&&!SKU_SPECIALI.some(x=>x.sku===sk)) skuCount[sk]=(skuCount[sk]||0)+1;
        });
        const skuPiu = Object.entries(skuCount).sort((a,b)=>b[1]-a[1])[0]?.[0]||"";
        const skuObj = skuConSpecialiList.find(s=>s.sku===skuPiu);
        const tc = skuObj?.tc||0;
        if(tc<=0) return;

        // Obiettivo Reale: minuti effettivi / TC
        const sessioniLinea = sessioni.filter(s=>(s.lineaCorrente===lineaId||s.lineaInizio===lineaId)&&s.inizio);
        const minPerMat = {};
        sessioniLinea.forEach(s=>{
          const mat = s.matricola||s.nome||s.id; if(!mat) return;
          const sku = s.skuCorrente||s.sku||"";
          if(SKU_SPECIALI.some(x=>x.sku===sku)) return;
          const dI = parseData(s.inizio); if(!dI) return;
          const attiva = !s.fine||s.fine===""||s.fine===null||s.fine==="null";
          const dF = attiva?null:parseData(s.fine);
          if(!minPerMat[mat]) minPerMat[mat]={base:Math.max(0,(secFine-(dI.getHours()*3600+dI.getMinutes()*60))/60),sottrai:0};
          if(s.corsi) s.corsi.forEach(c=>{
            const dC=parseData(c.quando); if(!dC) return;
            const sC=dC.getHours()*3600+dC.getMinutes()*60;
            const eC=c.rientro?(()=>{const dR=parseData(c.rientro);return dR?dR.getHours()*3600+dR.getMinutes()*60:secFine;})():secFine;
            minPerMat[mat].sottrai+=Math.max(0,(eC-sC)/60);
          });
        });
        let minTotali=0;
        Object.values(minPerMat).forEach(({base,sottrai})=>{ minTotali+=Math.max(0,base-sottrai); });
        const obReale = minTotali>0?Math.ceil(minTotali/tc):null;

        // Obiettivo Teorico: matricole uniche × ore turno / TC
        const matricoleUniche = new Set();
        sessioniLinea.forEach(s=>{
          const mat=s.matricola||s.nome||s.id; if(!mat) return;
          if(SKU_SPECIALI.some(x=>x.sku===(s.skuCorrente||s.sku||""))) return;
          matricoleUniche.add(mat);
        });
        const obTeorico = matricoleUniche.size>0?Math.ceil(matricoleUniche.size*oreTotali*60/tc):null;

function LogoSpinner({size=48}) {
  // Aumenta la dimensione di rendering del 40% per dare più spazio alla N
  const s = Math.round(size * 1.4);
  const ring = Math.max(3, Math.floor(s/18));
  const inset = Math.floor(s/10);
  const pad = 2;
  return (
    <div style={{position:"relative",width:s,height:s,flexShrink:0}}>
      <div style={{position:"absolute",inset:0,borderRadius:"50%",border:`${ring}px solid transparent`,borderTopColor:"#7c3aed",borderRightColor:"#a78bfa",animation:"spin 1s linear infinite",boxShadow:"0 0 10px 3px #7c3aed66"}}/>
      <div style={{position:"absolute",inset:Math.floor(inset/3),borderRadius:"50%",border:`${Math.max(2,ring-1)}px solid transparent`,borderBottomColor:"#6d28d9",borderLeftColor:"#c4b5fd",animation:"spin 1.5s linear infinite reverse"}}/>
      <div style={{position:"absolute",inset:inset,borderRadius:"50%",background:"linear-gradient(135deg,#ffffff,#f0f0f0,#e8e8e8,#f5f5f5)",boxShadow:"inset 2px 2px 6px rgba(0,0,0,0.1),0 0 0 2px #a78bfa",display:"flex",alignItems:"center",justifyContent:"center",padding:pad}}>
        <img src="logo_Nexus.png" style={{width:"100%",height:"100%",objectFit:"contain"}} alt="N"/>
      </div>
    </div>
  );
}

            </div>
          )}
          {view==="dashboard"&&(
            <span style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:11,color:dashCfg.c,fontWeight:700}}>{dashCfg.t}</span>
              {ultimoSync2&&<span style={{fontSize:10,color:"#475569"}}>Aggiornato: {fmt(ultimoSync2)}</span>}
              <button onClick={caricaSessioni} style={{background:"transparent",border:"1px solid #e2e8f0",borderRadius:4,color:"#64748b",cursor:"pointer",fontSize:11,padding:"2px 8px",fontFamily:"'Montserrat',sans-serif"}}>↻</button>
            </span>
          )}
        </div>
      )}
      {view==="checkin"&&(
        <CheckIn onSuccess={add} onCheckout={co} onTrasf={tr} sessioni={sess} sessSheets={sessSheets} coSheets={coFromSheets} aggiornaSessioni={()=>setTimeout(caricaSessioni,3000)} linee={linee} operatori={operatori} skuList={skuList} syncCfg={syncCfg} dashCfg={dashCfg} ultimoSync2={ultimoSync2} lineaFiltro={accesso&&accesso.ruolo==="linea"?accesso.linea:null} onGoToDashboard={()=>setView("dashboard")} onEsci={()=>{ setAccesso(null); setView("login"); }} rampeSheets={rampeSheets} onQualita={(l)=>{ setLineaQualita(l); setViewQualita("dashboard"); }}/>
      )}
      {view==="login"&&(
        <LoginDashboard linee={linee} sync={sync} onLogin={(ruolo,linea)=>{ setAccesso({ruolo,linea}); setView("checkin"); }} onQualita={()=>setViewQualita("login")} onQualitaAdmin={()=>{ setLineaQualita(null); setViewQualita("dashboard"); }}/>
      )}
      {view==="dashboard"&&accesso&&(
        <Dashboard
          sessioni={accesso.ruolo==="linea" ? sessSheets.filter(s=>s.lineaCorrente===accesso.linea.id) : sessSheets}
          linee={linee} skuList={skuList} operatori={operatori}
          isAdmin={accesso.ruolo==="admin"}
          lineaFiltro={accesso.ruolo==="linea"?accesso.linea:null}
          onReset={rst} onCO={co} onCOSheets={coFromSheets} onTr={tr}
          onAggiornaSessioni={()=>setTimeout(caricaSessioni,3000)}
          rampeSheets={rampeSheets}
          editOrario={URL_VIEW==="admin" || accesso.ruolo==="admin"}/>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
